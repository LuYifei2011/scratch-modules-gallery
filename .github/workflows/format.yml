name: Format code
on: [push, pull_request]

permissions:
  contents: write

jobs:
  run:
    name: Format code
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Format Scratchblocks Scripts
        run: bun run format:scripts

      - name: Format code with Prettier
        run: bun run format

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Format code and scratchblocks scripts'
          branch: ${{ github.head_ref }}
