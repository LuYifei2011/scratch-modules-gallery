name: Complete Translations

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: only report missing translations without creating an issue'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  check-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Check translation completeness
        id: check
        run: |
          set +e
          REPORT=$(bun scripts/check-translations.ts --format=markdown)
          EXIT_CODE=$?

          # Also write JSON report for programmatic use (may also exit non-zero)
          bun scripts/check-translations.ts --format=json > /tmp/translation-report.json
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Write report to file (handles multiline)
          echo "$REPORT" > /tmp/translation-report.md

          echo "--- Translation Report ---"
          echo "$REPORT"

      - name: Report results (dry run)
        if: inputs.dry_run
        run: |
          echo "::notice::Dry run mode — no issue will be created."
          if [ "${{ steps.check.outputs.exit_code }}" = "0" ]; then
            echo "✅ All translations are complete!"
          else
            echo "⚠️ Missing translations detected. See report above."
          fi

      - name: Create issue for Copilot
        if: ${{ !inputs.dry_run && steps.check.outputs.exit_code != '0' }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/translation-report.md', 'utf8');
            const jsonReport = JSON.parse(fs.readFileSync('/tmp/translation-report.json', 'utf8'));

            const totalIssues = jsonReport.totalIssues;

            // Build the issue body with context for the AI agent
            const body = [
              '## Task: Complete Missing Translations',
              '',
              'This issue was automatically created by the **Complete Translations** workflow.',
              '',
              report,
              '',
              '---',
              '',
              '## Instructions for Copilot',
              '',
              'Please complete the missing translations listed above. Follow these guidelines:',
              '',
              '### Global UI translations (`src/i18n/*.json`)',
              '- Use `src/i18n/en.json` as the source of truth',
              '- For `zh-cn`: translate to **Simplified Chinese**',
              '- For `zh-tw`: translate to **Traditional Chinese**',
              '- Preserve all `{placeholder}` variables exactly as they appear in the English source',
              '- Keep the same JSON structure and nesting',
              '',
              '### Tags translations (`src/i18n/tags.json`)',
              '- Each tag needs translations for all supported locales: `en`, `zh-cn`, `zh-tw`',
              '- Tags are short labels (1-2 words typically)',
              '',
              '### Module translations (`content/modules/<id>/i18n/<locale>.json`)',
              '- `name`: translate the module display name',
              '- `description`: translate the module description',
              '- `scriptTitles`: translate script section titles',
              '- `variables` / `lists`: translate variable/list display names (keep original English name as key)',
              '- `events`: translate event broadcast names (keep original English name as key)',
              '- `procedures`: translate custom block patterns (keep `%1`, `%2`, etc. parameter placeholders)',
              '- `procedureParams`: translate parameter names',
              '- `comments`: translate code comments',
              '- Refer to existing translations in the same module for style consistency',
              '',
              '### Module notes (`content/modules/<id>/notes/<locale>.md`)',
              '- Translate the Markdown content',
              '- Preserve all Markdown formatting, links, and `<scratchblocks>` / `<sb>` tags',
              '- Keep code blocks and technical terms where appropriate',
              '',
              '### Validation',
              'After making changes, ensure:',
              '1. All JSON files are valid JSON with consistent formatting',
              '2. `bun run build` completes without errors',
              '3. Run `bun scripts/check-translations.ts` to verify completeness',
            ].join('\n');

            // Search for existing open issues with the same title
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'i18n',
              per_page: 10,
            });

            const existingIssue = existingIssues.data.find(
              (i) => i.title === '🌐 Complete missing translations'
            );

            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body,
              });
              core.info(`Updated existing issue #${existingIssue.number}`);

              // Also post a comment to notify
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 Translation report updated (${totalIssues} issue(s) remaining). Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              // Create new issue
              // Ensure the 'i18n' label exists
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'i18n',
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'i18n',
                  color: '0075ca',
                  description: 'Internationalization / translation tasks',
                });
              }

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🌐 Complete missing translations',
                body: body,
                labels: ['i18n'],
              });
              core.info(`Created issue #${issue.data.number}`);
            }

      - name: All translations complete
        if: ${{ !inputs.dry_run && steps.check.outputs.exit_code == '0' }}
        run: echo "✅ All translations are complete! No action needed."
