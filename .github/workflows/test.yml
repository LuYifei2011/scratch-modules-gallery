name: Test

on:
  push:
    branches: ['main']
    paths:
      - 'scripts/**'
      - 'src/i18n/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    branches: ['main']
    paths:
      - 'scripts/**'
      - 'src/i18n/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test tests/*.test.js
