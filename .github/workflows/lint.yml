name: Lint and Typecheck

on:
  push:
    branches: ['main']
    paths:
      - '.github/workflows/lint.yml'
      - 'eslint.config.js'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: ['main']
    paths:
      - '.github/workflows/lint.yml'
      - 'eslint.config.js'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
