<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>封面图预览 - Dev Tools</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #1e293b;
        border-bottom: 1px solid #334155;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .toolbar-title {
        font-weight: 600;
        font-size: 15px;
        color: #f1f5f9;
        white-space: nowrap;
      }
      .toolbar a {
        color: #94a3b8;
        text-decoration: none;
        font-size: 13px;
      }
      .toolbar a:hover {
        color: #60a5fa;
      }
      .locale-group {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }
      .locale-group label {
        font-size: 13px;
        color: #94a3b8;
      }
      .locale-select {
        background: #334155;
        color: #e2e8f0;
        border: 1px solid #475569;
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .locale-select:focus {
        outline: 2px solid #3b82f6;
        outline-offset: 1px;
      }
      .stats {
        font-size: 13px;
        color: #64748b;
        white-space: nowrap;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
        padding: 20px;
      }
      .card {
        background: #1e293b;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #334155;
        transition: border-color 0.15s;
      }
      .card:hover {
        border-color: #3b82f6;
      }
      .cover-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 1200 / 630;
        background: #0f172a;
      }
      .cover-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .cover-error {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #64748b;
        font-size: 13px;
      }
      .cover-error svg {
        opacity: 0.4;
      }
      .cover-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #475569;
        font-size: 13px;
      }
      .card-info {
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-top: 1px solid #334155;
      }
      .card-id {
        font-family: monospace;
        font-size: 12px;
        color: #94a3b8;
        background: #0f172a;
        padding: 2px 8px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      .card-name {
        font-size: 13px;
        color: #cbd5e1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-actions {
        margin-left: auto;
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .card-actions a {
        color: #64748b;
        text-decoration: none;
        font-size: 11px;
        padding: 3px 7px;
        border: 1px solid #334155;
        border-radius: 4px;
        transition: all 0.1s;
        white-space: nowrap;
      }
      .card-actions a:hover {
        color: #e2e8f0;
        border-color: #64748b;
        background: #334155;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        flex-direction: column;
        gap: 12px;
        color: #64748b;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #334155;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error-msg {
        background: #450a0a;
        color: #fca5a5;
        border: 1px solid #7f1d1d;
        border-radius: 8px;
        padding: 16px 20px;
        margin: 20px;
        font-size: 14px;
      }
      .tag {
        display: inline-block;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        background: #1e3a5f;
        color: #93c5fd;
        margin-right: 3px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span class="toolbar-title">🖼 封面图预览</span>
      <a href="/__dev/">← 返回 Dev Tools</a>
      <div class="locale-group">
        <label for="locale-select">语言：</label>
        <select id="locale-select" class="locale-select">
          <option value="en">English (en)</option>
          <option value="zh-cn" selected>简体中文 (zh-cn)</option>
          <option value="zh-tw">繁體中文 (zh-tw)</option>
        </select>
      </div>
      <span class="stats" id="stats"></span>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <span>加载模块列表…</span>
      </div>
    </div>

    <script>
      const localeSelect = document.getElementById('locale-select')
      const stats = document.getElementById('stats')
      const content = document.getElementById('content')

      let modules = []
      let currentLocale = localeSelect.value

      async function loadModules() {
        try {
          const res = await fetch('/api/modules')
          if (!res.ok) throw new Error(`HTTP ${res.status}`)
          const data = await res.json()
          modules = data.modules || []
          render()
        } catch (e) {
          content.innerHTML = `<div class="error-msg">加载模块列表失败：${e.message}<br>请确保开发服务器正在运行。</div>`
        }
      }

      function render() {
        const locale = currentLocale
        stats.textContent = `共 ${modules.length} 个模块 + 主页`

        if (!modules.length) {
          content.innerHTML = '<div class="loading"><span>暂无模块</span></div>'
          return
        }

        // 主页封面卡片
        const homeCoverUrl = `/${locale}/cover.png`
        const homeUrl = `/${locale}/`
        const homeName = locale === 'en' ? 'Home' : locale === 'zh-tw' ? '首頁' : '首页'
        const homeCard = `
          <div class="card" data-id="home">
            <div class="cover-wrap">
              <div class="cover-placeholder">加载中…</div>
              <img
                class="cover-img"
                data-src="${homeCoverUrl}"
                alt="${homeName} 封面"
                style="display:none"
              />
              <div class="cover-error" style="display:none">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <path d="M3 9l4-4 4 4 4-4 4 4"/>
                  <circle cx="8.5" cy="13.5" r="1.5"/>
                </svg>
                <span>封面图不存在</span>
                <span style="font-size:11px;opacity:.7">${homeCoverUrl}</span>
              </div>
            </div>
            <div class="card-info">
              <span class="card-id">home</span>
              <span class="card-name" title="${homeName}">${homeName}</span>
              <div class="card-actions">
                <a href="${homeUrl}" target="_blank">查看页面</a>
                <a href="${homeCoverUrl}" target="_blank">原图</a>
              </div>
            </div>
          </div>
        `

        const cards = modules
          .map((mod) => {
            const coverUrl = `/${locale}/modules/${mod.id}/cover.png`
            const moduleUrl = `/${locale}/modules/${mod.id}/`
            const name =
              typeof mod.name === 'object' ? mod.name[locale] || mod.name['en'] || mod.id : mod.name
            return `
            <div class="card" data-id="${mod.id}">
              <div class="cover-wrap">
                <div class="cover-placeholder">加载中…</div>
                <img
                  class="cover-img"
                  data-src="${coverUrl}"
                  alt="${name} 封面"
                  style="display:none"
                />
                <div class="cover-error" style="display:none">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M3 9l4-4 4 4 4-4 4 4"/>
                    <circle cx="8.5" cy="13.5" r="1.5"/>
                  </svg>
                  <span>封面图不存在</span>
                  <span style="font-size:11px;opacity:.7">${coverUrl}</span>
                </div>
              </div>
              <div class="card-info">
                <span class="card-id">${mod.id}</span>
                <span class="card-name" title="${name}">${name}</span>
                <div class="card-actions">
                  <a href="${moduleUrl}" target="_blank">查看页面</a>
                  <a href="${coverUrl}" target="_blank">原图</a>
                </div>
              </div>
            </div>
          `
          })
          .join('')

        content.innerHTML = `<div class="grid">${homeCard}${cards}</div>`
        loadImages()
      }

      function loadImages() {
        const imgs = content.querySelectorAll('img[data-src]')
        imgs.forEach((img) => {
          const src = img.dataset.src
          const wrap = img.closest('.cover-wrap')
          const placeholder = wrap.querySelector('.cover-placeholder')
          const errEl = wrap.querySelector('.cover-error')

          img.onload = () => {
            img.style.display = ''
            if (placeholder) placeholder.style.display = 'none'
          }
          img.onerror = () => {
            img.style.display = 'none'
            if (placeholder) placeholder.style.display = 'none'
            if (errEl) errEl.style.display = ''
          }
          img.src = src
        })
      }

      localeSelect.addEventListener('change', () => {
        currentLocale = localeSelect.value
        render()
      })

      loadModules()
    </script>
  </body>
</html>
